clocks:
  - name:      SYS_CLK
    port:      SYS_CLK
    period_ns: 20.0
    reset:
      port:        RESET_N
      active_low:  true
      sync_stages: 2

plls:
  - inst:   clkpll_inst
    source: SYS_CLK
    outputs:
      - name:        clk_100mhz
        multiply_by: 2
        divide_by:   1
        pin_index:   0
        reset:
          sync_from:   SYS_CLK
          sync_stages: 2

clock_groups:
  - type: asynchronous
    groups:
      - [SYS_CLK]
      - [clk_100mhz]

io_delays:
  auto:                  true
  clock:                 SYS_CLK
  default_input_max_ns:  3.0
  default_output_max_ns: 3.0

false_paths:
  - from_port: RESET_N
    comment:   "Async reset"

derive_uncertainty: true


# timing_config.yaml
plls:
  - inst:   ClkPll
    source: SYS_CLK
    outputs:
      - name: clk_100mhz    # CPU/periph domain
        multiply_by: 2
        divide_by:   1
      - name: pixel_clk     # VGA/HDMI domain
        multiply_by: 4
        divide_by:   5      # 40 MHz pre 800x600
      - name: sdram_clk     # SDRAM domain
        multiply_by: 2
        divide_by:   1
      - name: sdram_clk_shifted  # SDRAM s fázovým posunom
        multiply_by: 2
        divide_by:   1
        phase_shift: 90


