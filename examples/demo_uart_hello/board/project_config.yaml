# DEMO: uart_hello
# First SoC mode demo - PicoRV32 + UART + LEDs
# C program prints Hello World and blinks LED on each message

board:
  type: qmtech_ep4ce55

soc:
  cpu: picorv32
  ram_size: 4096
  clock_freq: 50_000_000

onboard:
  leds:    true
  seg:     false
  dig:     false
  buttons: false
  uart:    true

pmod:
  J10: NONE
  J11: NONE

# CPU parameter overrides (merged with generator defaults)
# Default: ENABLE_IRQ=1, LATCHED_MEM_RDATA=1, PROGADDR_RESET=0
cpu_params:
  ENABLE_MUL:        1
  ENABLE_FAST_MUL:   0

peripherals:
  uart0:
    type: uart
    enabled: true
    base: 0x80002000
  leds0:
    type: leds
    enabled: true
    base: 0x80003000
