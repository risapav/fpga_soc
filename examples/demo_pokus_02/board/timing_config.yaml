# board/timing_config.yaml
clocks:
  - name:       SYS_CLK
    port:       SYS_CLK
    period_ns:  20.0
    reset:
      port:        RESET_N
      active_low:  true
      sync_stages: 2

plls:
  - inst:   clkpll_inst
    source: SYS_CLK
    outputs:
      - name:        pixel_clk
        multiply_by: 4
        divide_by:   5
        pin_index:   0
        reset:
          sync_from:   SYS_CLK
          sync_stages: 2
      - name:        pixel_clk5
        multiply_by: 4
        divide_by:   1
        pin_index:   1

clock_groups:
  - type: asynchronous
    groups:
      - [SYS_CLK]
      - [pixel_clk, pixel_clk5]

io_delays:
  auto:                   true
  clock:                  SYS_CLK
  default_input_max_ns:   3.0
  default_output_max_ns:  3.0

false_paths:
  - from_port: RESET_N
    comment:   "Async reset"
