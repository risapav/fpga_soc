# =============================================================================
# IP Registry pre QMTech Cyclone IV E SoC
# Synchronized with hal_qmtech_ep4ce55.tcl v4.0
# FIX: V_etky perif_rie s_ spr_vne pod jedn_m k___om `peripherals:`
# FIX: AXI typy s_ atrib_tom ka_dej perif_rie, nie samostatn_ sekcie
# =============================================================================

peripherals:

  # --- CPU Core ---
  picorv32:
    description: "PicoRV32 RISC-V CPU (RV32I/IM)"
    type: cpu
    files: [picorv32/picorv32.v]
    interfaces:
      - {name: bus, type: simple_bus, role: master}

  vexriscv:
    description: "VexRiscv RISC-V CPU (RV32IM, 5-stage pipeline)"
    type: cpu
    files: [vexriscv/VexRiscv.v, vexriscv/vexriscv_wrapper.sv]
    interfaces:
      - {name: bus, type: simple_bus, role: master}

  # --- System peripherals ---
  intc:
    description: "Vectored Interrupt Controller"
    module: "soc_intc"
    bus_type: simple_bus
    needs_bus: true
    address_range: 0x20
    registers:
      - {name: ENABLE,   offset: 0x00, access: rw}
      - {name: PENDING,  offset: 0x04, access: ro}
      - {name: CLAIM,    offset: 0x08, access: ro}
      - {name: COMPLETE, offset: 0x0C, access: wo}

  # --- On-board peripherals ---
  uart:
    module: "uart_top"
    bus_type: simple_bus
    needs_bus: true
    address_range: 0x10
    port_map: {clk: "clk_i", rst_n: "rst_ni"}
    interrupts:
      - {name: rx_done, id: 0}
    registers:
      - {name: DATA, offset: 0x00, access: rw, width: 8,
         desc: "W: TX byte  R: RX byte"}
      - {name: STAT, offset: 0x04, access: ro, width: 2,
         desc: "[0]=TX_BUSY  [1]=RX_VALID"}
    interfaces:
      - {name: bus,  type: simple_bus, role: slave}
      - {name: uart, type: serial,
         signals: [{name: tx_o, dir: output, top_name: UART_TX, no_prefix: true}, {name: rx_i, dir: input, top_name: UART_RX, no_prefix: true}]}

  timer:
    module: "timer_top"
    bus_type: simple_bus
    needs_bus: true
    address_range: 0x10
    interrupts:
      - {name: alarm, id: 2}
    interfaces:
      - {name: bus, type: simple_bus, role: slave}

  seg7:
    module: "seg7_top"
    bus_type: simple_bus
    needs_bus: true
    address_range: 0x10
    interfaces:
      - {name: bus, type: simple_bus, role: slave}
      - {name: seg7, type: display,
         signals: [{name: seg, dir: output, width: 8},
                   {name: dig, dir: output, width: 4}]}

  leds:
    module: "leds_top"
    bus_type: simple_bus
    needs_bus: true
    address_range: 0x08
    port_map: {clk: "SYS_CLK", rst_n: "RESET_N"}
    registers:
      - {name: LED, offset: 0x00, access: rw, width: 6,
         desc: "LED output register [5:0]"}
    interfaces:
      - {name: bus, type: simple_bus, role: slave}
      - {name: leds, type: gpio,
         signals: [{name: led, dir: output, width: 6, top_name: ONB_LEDS, no_prefix: true}]}

  buttons:
    module: "buttons_top"
    bus_type: simple_bus
    needs_bus: true
    address_range: 0x08
    interfaces:
      - {name: bus, type: simple_bus, role: slave}
      - {name: buttons, type: gpio,
         signals: [{name: btn, dir: input, width: 2}]}

  # --- Extended peripherals ---
  vga:
    module: "vga_top"
    bus_type: simple_bus
    needs_bus: true
    address_range: 0x20
    interfaces:
      - {name: bus, type: simple_bus, role: slave}
      - {name: vga, type: video,
         signals: [{name: hsync, dir: output},
                   {name: vsync, dir: output},
                   {name: rgb,   dir: output, width: 12}]}

  sdram:
    module: "sdram_controller"
    bus_type: simple_bus
    needs_bus: true
    address_range: 0x1000
    interfaces:
      - {name: bus,   type: simple_bus, role: slave}
      - {name: sdram, type: memory,
         signals: [{name: addr, dir: output, width: 13},
                   {name: dq,   dir: inout,  width: 16}]}

  eth:
    module: "eth_mac"
    bus_type: simple_bus
    needs_bus: true
    address_range: 0x80
    interfaces:
      - {name: bus, type: simple_bus, role: slave}
      - {name: eth, type: interface,
         signals: [{name: tx_o, dir: output}, {name: rx_i, dir: input}]}

  sdc:
    module: "sdc_interface"
    bus_type: simple_bus
    needs_bus: true
    address_range: 0x40
    interfaces:
      - {name: bus, type: simple_bus, role: slave}
      - {name: sdc, type: interface,
         signals: [{name: cmd,  dir: output},
                   {name: data, dir: inout, width: 8}]}

  cam:
    module: "cam_interface"
    bus_type: simple_bus
    needs_bus: true
    address_range: 0x40
    interfaces:
      - {name: bus, type: simple_bus, role: slave}
      - {name: cam, type: interface,
         signals: [{name: vsync, dir: input},
                   {name: hsync, dir: input},
                   {name: data,  dir: input, width: 8}]}

  # --- AXI peripherals (roz__ren_, parametrizovate_n_) ---

  blink_test:
    description: Minimal LED blink - HW verification test
    module: blink_test
    bus_type: none
    needs_bus: false
    params:
      - {name: CLK_FREQ, default: 50_000_000}
    interfaces:
      - name: leds
        type: gpio
        signals:
          - {name: ONB_LEDS, dir: output, width: 6}

  led_effects:
    description: Standalone LED effects demo module
    module: led_effects
    bus_type: none
    needs_bus: false
    params:
      - {name: CLK_FREQ, default: 50_000_000}
    interfaces:
      - name: leds
        type: gpio
        signals:
          - {name: ONB_LEDS,   dir: output, width: 6}
          - {name: PMOD_J10_P, dir: output, width: 8}
          - {name: PMOD_J11_P, dir: output, width: 8}

  seg7_counter:
    description: Standalone 7-segment counter with button control
    module: seg7_counter
    bus_type: none
    needs_bus: false
    params:
      - {name: CLK_FREQ, default: 50_000_000}
    interfaces:
      - name: display
        type: display
        signals:
          - {name: ONB_SEG, dir: output, width: 8}
          - {name: ONB_DIG, dir: output, width: 3}
      - name: buttons
        type: gpio
        signals:
          - {name: ONB_BUTTONS, dir: input, width: 2}

  axi_ram:
    module: "axi_ram_top"
    bus_type: axi_full
    needs_bus: true
    address_range: 65536
    interrupts: []
    params:
      data_width: 32
      addr_width: 16
      id_width: 4

  axi_lite_ctrl:
    module: "axi_lite_ctrl_top"
    bus_type: axi_lite
    needs_bus: true
    address_range: 256
    params:
      data_width: 32
      addr_width: 8

  axi_stream_source:
    module: "axi_stream_source_top"
    bus_type: axi_stream
    needs_bus: false
    params:
      data_width: 64
      tuser_width: 8

# --- PMOD port konfigur_cia (nie s_ perif_rie, s_ to fyzick_ konektory) ---
pmod_config:
  J10:
    SEG:  {io_std: "3.3-V LVTTL"}
    GPIO: {io_std: "3.3-V LVTTL"}
  J11:
    HDMI: {io_std: "LVDS"}
    SEG:  {io_std: "3.3-V LVTTL"}
    GPIO: {io_std: "3.3-V LVTTL"}
