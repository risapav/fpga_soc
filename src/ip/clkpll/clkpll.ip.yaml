# src/ip/clkpll/clkpll.ip.yaml
type: standalone
module: ClkPll_inst
bus_type: none
needs_bus: false
gen_regs: false
no_hw_warning: true
files:
  - "ClkPll.qip"
port_map:
  clk:   "inclk0"
  rst_n: "areset"
interfaces:
  - type: clock_output
    signals:
      - {name: c0,     dir: output, width: 1, top_name: clk_100mhz}
      - {name: locked, dir: output, width: 1, top_name: PLL_LOCKED}
